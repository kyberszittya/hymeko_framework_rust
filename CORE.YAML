# CORE.YAML — Core Framework Lockdown Manifest
#
# Canonical filename at repository root (CLAUDE.md §0). This file is core:
# edits require approval (see `approval:` below).
#
# APPROVED-CORE-EDIT: core-manifest-and-hymeko-core-clippy (2026-05-11, user chat).

schema_version: 1

project:
  name: HyMeKo
  root_language: rust
  notes: |
    Items listed here are read-only by default. Modifying any of them
    requires explicit user approval BEFORE any code change.
    Workarounds in non-core code are always preferred over a "small"
    core edit. When in doubt: halt and ask.

  # ----------------------------------------------------------------------
  # Lockdown levels
  # ----------------------------------------------------------------------
  #   full           No edits. Includes comments, whitespace, formatting.
  #                  Regenerated artifacts (parser tables, RTL fixtures)
  #                  are regenerated only via the documented procedure.
  #
  #   implementation Public API may be extended (additive only).
  #                  Internal logic frozen. Bug-fix patches require
  #                  approval and a regression test.
  #
  #   api            Public API frozen (signatures, types, wire protocol,
  #                  CLI flags). Internal refactors permitted from
  #                  non-core PRs, gated on full integration test pass.
  # ----------------------------------------------------------------------

crates:
  - name: hymeko_core
    path: hymeko_core
    lockdown: full
    reason: >
      Foundational types: hyperedge, incidence matrix, signed-incidence
      tensor, GGK 4-tuple K=(B,G,μ,r). Any change propagates to every
      downstream crate and invalidates published benchmarks.

  - name: hymeko_query
    path: hymeko_query
    lockdown: implementation
    reason: >
      LALR(1) query layer. Grammar and parser tables frozen.
      New query combinators must live in a separate, non-core crate.

  - name: hymeko_client
    path: hymeko_client
    lockdown: api
    reason: >
      Client-facing API and wire protocol. Public methods frozen.
      Internal refactors permitted with full integration tests.

  - name: hymeko_daemon
    path: hymeko_daemon
    lockdown: api
    reason: >
      IPC daemon. Protocol surface, message schema, and CLI flags
      frozen. Storage backend is implementation, not API.

  - name: parser
    path: parser
    lockdown: full
    reason: >
      Generated LALR(1) tables. Regenerate via the documented
      procedure only; never hand-edit.

# ----------------------------------------------------------------------
# Specific files outside the crate tree
# ----------------------------------------------------------------------
files:
  - path: docs/spec/hsmm_isa.md
    lockdown: full
    reason: HSMM ISA reference. Source of truth, frozen post-Zenodo DOI.

  - path: rtl/hsmm_core.sv
    lockdown: full
    reason: 822-line synthesizable SystemVerilog RTL. Tested against
      golden vectors; edits invalidate the test suite.

  - path: docs/spec/g_sphf_axioms.tex
    lockdown: full
    reason: GGK 4-tuple axioms K1–K4. Cited in published work.

  - path: docs/spec/hsmm_primitives.md
    lockdown: full
    reason: NAV, NEWV, NEWE, ATT, DET, MOVC primitive semantics.

# ----------------------------------------------------------------------
# Glob patterns (matched relative to repo root)
# ----------------------------------------------------------------------
globs:
  - pattern: "hymeko_core/Cargo.toml"
    lockdown: full
    reason: Core crate manifest; dependency edits require approval.

  - pattern: "parser/Cargo.toml"
    lockdown: full
    reason: Parser crate manifest; dependency edits require approval.

  - pattern: "**/*.lalrpop"
    lockdown: full
    reason: Grammar files. Regenerate via build script; never hand-edit.

  - pattern: "rtl/golden/**"
    lockdown: full
    reason: RTL golden test vectors.

  - pattern: "docs/spec/**/*.tex"
    lockdown: full
    reason: Formal specification sources.

# ----------------------------------------------------------------------
# Pinned dependencies
# Touching these is treated as a core edit.
# ----------------------------------------------------------------------
dependencies:
  pinned:
    rust:
      - name: tokio
        version: "=1.40.0"
        reason: Async runtime. Tested against this exact version.
      - name: serde
        version: "1"
        reason: API-stable; minor bumps allowed, major requires approval.
      - name: nalgebra
        version: "=0.33.0"
        reason: Numerical core; FP behavior must be reproducible.
      - name: lalrpop
        version: "=0.20.2"
        reason: Parser generator. Bumping changes generated tables.

    python:
      # APPROVED-CORE-EDIT: torch-cuda13 (2026-05-27, user chat) —
      # upgraded for CUDA 13.2 (cu132). Numerical parity vs RTL fixtures
      # must be re-validated; see docs/plans/2026-05-27-torch-cuda13-upgrade/.
      - name: torch
        version: "==2.12.0"
        reason: Reference simulator (CUDA 13.2 / cu132). Numerical parity with
          RTL fixtures re-validated post-upgrade.
      - name: numpy
        version: ">=2,<3"
        reason: Required cascade of the torch 2.12 upgrade (wheels target NumPy 2).
          Serialised-tensor fixtures re-validated under NumPy 2.

# ----------------------------------------------------------------------
# Allowlist — paths that may LOOK like core but are explicitly editable.
# ----------------------------------------------------------------------
allowlist:
  - tests/**
  - benches/**
  - examples/**
  - docs/plans/**
  - reports/**
  - scripts/dev/**
  - .github/**

# ----------------------------------------------------------------------
# Approval mechanism
# ----------------------------------------------------------------------
approval:
  required_for:
    - any modification to a `lockdown: full` item
    - any modification to a `lockdown: implementation` item beyond
      additive public API
    - any modification to `lockdown: api` items in core crates
    - any addition, removal, or version change of a pinned dependency
    - any change to this file (`CORE.YAML`)

  mechanism: |
    A change may proceed only after the user replies in the chat with
    the literal token:

        APPROVED-CORE-EDIT: <short-slug>

    Claude Code must:
      1. Quote that token verbatim in the plan document (see CLAUDE.md §2).
      2. Include it in the resulting commit message footer.
      3. Reference the approving chat turn ID if available.

    A token applies only to the slug it names; it does not generalise.

# ----------------------------------------------------------------------
# Policies on edge cases
# ----------------------------------------------------------------------
policies:
  on_violation: halt_and_ask
  on_missing_file: halt_and_ask
  on_malformed_file: halt_and_ask
  on_unknown_path: treat_as_non_core
  on_dependency_drift: halt_and_ask
