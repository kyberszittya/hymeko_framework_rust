codecov:
  require_ci_to_pass: false
  precision: 2
  round: down
  layout: reach,diff,flags,tree,footer
  behavior: default

coverage:
  precision: 2
  round: down
  range:
    - 70.0
    - 100.0

ignore:
  - "tests"
  - "build.rs"
  - "**/tests/**"

flags:
  rust:
    carryforward: false
    paths:
      - hymeko/parser/src/

comment:
  layout: "reach,diff,flags,tree,footer"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true
  delete_outdated: false
  hide_project_coverage: false
  hide_branch_coverage: false

status:
  project:
    default:
      target: 60%
      threshold: 1%
      base: auto
    parser:
      target: 70%
      threshold: 1%
      paths:
        - hymeko/parser/src/
  patch:
    default:
      target: 60%
      threshold: 1%
  changes:
    default:
      target: 60%
      threshold: 1%

