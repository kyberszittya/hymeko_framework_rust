codecov:
  require_ci_to_pass: false
  precision: 2
  round: down
  layout: reach,diff,flags,tree,footer
  behavior: default

coverage:
  precision: 2
  round: down
  range:
    - 70.0
    - 100.0

ignore:
  - "tests"
  - "build.rs"
  - "**/tests/**"

flags:
  hymeko:
    carryforward: false
    paths:
      - src/
  hymeko_core:
    carryforward: false
    paths:
      - hymeko_core/src/
  hymeko_daemon:
    carryforward: false
    paths:
      - hymeko_daemon/src/
  hymeko_py:
    carryforward: false
    paths:
      - hymeko_py/src/
  parser:
    carryforward: false
    paths:
      - parser/src/

comment:
  layout: "reach,diff,flags,tree,footer"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true
  delete_outdated: false
  hide_project_coverage: false
  hide_branch_coverage: false

status:
  project:
    default:
      target: 60%
      threshold: 1%
      base: auto
    hymeko:
      target: 60%
      threshold: 1%
      flags: hymeko
    hymeko_core:
      target: 65%
      threshold: 1%
      flags: hymeko_core
    hymeko_daemon:
      target: 60%
      threshold: 1%
      flags: hymeko_daemon
    hymeko_py:
      target: 60%
      threshold: 1%
      flags: hymeko_py
    parser:
      target: 70%
      threshold: 1%
      flags: parser
  patch:
    default:
      target: 60%
      threshold: 1%
  changes:
    default:
      target: 60%
      threshold: 1%
