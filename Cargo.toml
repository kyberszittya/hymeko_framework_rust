[package]
name = "hymeko_framework"
version = "0.1.0"
edition = "2024"

[workspace]
members = [
    "hymeko/parser",
]
resolver = "2"

[workspace.dependencies]
blake3 = ">=1"
memmap2 = "0.9.10"
parser = { path = "hymeko/parser" }

[dependencies]
blake3 = { workspace = true }
memmap2 = { workspace = true }
parser = { workspace = true }
criterion = ">=0.8"
[[bench]]
name = "parser_bench"
harness = false
[profile.bench]
opt-level = 3
debug = true       # Useful for profiling with tools like 'perf' or 'VTune'
lto = "thin"       # Link Time Optimization helps with the cross-module interning logic
codegen-units = 1  # Improves optimization quality for the lexer's hot loops