name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-release:
    name: Build Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: parser
            asset_name: parser-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: parser.exe
            asset_name: parser-windows-x86_64.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: parser
            asset_name: parser-macos-x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Release Binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload Release Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ./target/${{ matrix.target }}/release/${{ matrix.artifact_name }}
          retention-days: 1

  create-release:
    name: Create GitHub Release
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  python-package:
    name: Python Package Build & Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install maturin
        run: pip install maturin
      - name: Build Python package
        run: maturin build --release --manifest-path hymeko_py/Cargo.toml
      - name: Upload Python package artifact
        uses: actions/upload-artifact@v4
        with:
          name: hymeko_py-wheel
          path: hymeko_py/target/wheels/*.whl
          retention-days: 7
      - name: Publish to PyPI
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && secrets.PYPI_TOKEN != ''
        run: maturin publish --manifest-path hymeko_py/Cargo.toml --username __token__ --password ${{ secrets.PYPI_TOKEN }}
