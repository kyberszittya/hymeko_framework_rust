name: Deploy docs to GitHub Pages

on:
  push:
    branches: [master, main]
    paths:
      - 'docs/book/**'
      - 'docs/editor/**'
      - 'docs/demo/**'
      - '**/*.rs'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Single concurrent deployment — newer pushes cancel in-flight ones.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build mdBook + cargo doc
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      MDBOOK_VERSION: 0.4.40
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: docs-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            docs-${{ runner.os }}-cargo-

      - name: Install mdBook
        run: |
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C /usr/local/bin
          mdbook --version

      - name: Install wasm-pack + wasm32 target
        run: |
          rustup target add wasm32-unknown-unknown
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build mdBook
        run: mdbook build docs/book

      - name: Build WASM bundle (for /editor/ + /demo/)
        run: |
          wasm-pack build hymeko_wasm --target web --release \
              --out-dir ../docs/editor/pkg
          # Demo and editor share the same bundle, copy across.
          mkdir -p docs/demo/pkg
          cp docs/editor/pkg/* docs/demo/pkg/

      - name: Build cargo doc (public crates only)
        # `--no-deps` skips third-party crates (smaller output, faster build).
        # `--workspace` includes all in-tree crates.
        # Excludes daemon/wasm-bindgen-only crates that can't compile on the
        # default x86_64-unknown-linux-gnu target.
        run: |
          cargo doc --no-deps --workspace --release \
            --exclude hymeko_wasm \
            --exclude hymeko_daemon \
            --exclude hymeko_client \
            --exclude hymeko_mcp || \
          cargo doc --no-deps --release  # fallback to root crate only

      - name: Assemble _site/
        run: |
          mkdir -p _site
          cp -r docs/book/book/* _site/
          # Rust API docs at /api/
          mkdir -p _site/api
          if [ -d target/doc ]; then
            cp -r target/doc/* _site/api/
          fi
          cat > _site/api/index.html <<'EOF'
          <!DOCTYPE html>
          <meta charset="utf-8">
          <title>HyMeKo Rust API</title>
          <meta http-equiv="refresh" content="0; url=hymeko_query/index.html">
          <link rel="canonical" href="hymeko_query/index.html">
          <p>Redirecting to <a href="hymeko_query/index.html">hymeko_query/</a></p>
          EOF
          # Editor at /editor/ (WASM, with bundle)
          mkdir -p _site/editor
          cp -r docs/editor/* _site/editor/
          # Display-only demo at /demo/
          mkdir -p _site/demo
          cp -r docs/demo/* _site/demo/
          # Disable Jekyll so files starting with _ aren't filtered out
          touch _site/.nojekyll
          ls -la _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
