name: CI

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

env:
  CARGO_TERM_COLOR: always
  RUST_LOG: info
  # Incremental compilation is counterproductive in CI: caches are keyed on
  # Cargo.lock (a Cargo.lock change blows the whole target dir away), and the
  # extra fingerprint files inflate file-handle traffic on Windows runners,
  # where Defender's real-time scan + link.exe contend for cdylib write
  # handles and produce intermittent LNK1104 ("cannot open file").
  CARGO_INCREMENTAL: 0

permissions:
  contents: read

jobs:
  workspace-tests:
    name: Workspace Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust: [stable, nightly]
    steps:
      - uses: actions/checkout@v4
        with:
          # Commit SHA fetch avoids refs/pull/N/merge (intermittent auth failures on PRs).
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Install glslc (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y glslc

      - name: Install glslc (macOS)
        if: runner.os == 'macOS'
        run: brew install shaderc

      - name: Install glslc (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install -y vulkan-sdk
          $sdkRoot = (Get-ChildItem 'C:\VulkanSDK' | Sort-Object Name -Descending | Select-Object -First 1).FullName
          Add-Content -Path $env:GITHUB_PATH -Value "$sdkRoot\Bin"

      - name: Use rust-lld on Windows (cdylib LNK1104 mitigation)
        # MSVC link.exe and Windows Defender's real-time scan contend for the
        # freshly-written hymeko_query.dll cdylib output, producing flaky
        # LNK1104 "cannot open file" failures. rust-lld ships with the Rust
        # toolchain, writes the DLL in one pass, and is markedly less affected
        # by Defender file holds.
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Add-Content -Path $env:GITHUB_ENV -Value "CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_LINKER=rust-lld"

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ matrix.rust }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: cargo test --workspace --all-targets --verbose -- --nocapture

      - name: Run tests (nightly features)
        if: matrix.rust == 'nightly'
        run: cargo test --workspace --all-targets --all-features --verbose -- --nocapture

  package-check:
    name: Package Build & Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [hymeko_client, hymeko_core, hymeko_daemon, hymeko_py, hymeko_query, parser]
    steps:
      - uses: actions/checkout@v4
        with:
          # Commit SHA fetch avoids refs/pull/N/merge (intermittent auth failures on PRs).
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ubuntu-cargo-registry-${{ matrix.package }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ubuntu-cargo-git-${{ matrix.package }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ubuntu-cargo-build-target-${{ matrix.package }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build ${{ matrix.package }}
        run: cargo build --package ${{ matrix.package }} --all-targets --verbose

      - name: Test ${{ matrix.package }}
        run: cargo test --package ${{ matrix.package }} --all-targets --verbose -- --nocapture

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: package-check
    env:
      RUSTFLAGS: -C instrument-coverage
    steps:
      - uses: actions/checkout@v4
        with:
          # Commit SHA fetch avoids refs/pull/N/merge (intermittent auth failures on PRs).
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: taiki-e/install-action@cargo-tarpaulin

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ubuntu-coverage-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ubuntu-coverage-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ubuntu-coverage-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Generate per-package coverage reports
        shell: bash
        run: |
          set -euo pipefail
          packages=(hymeko_core hymeko_daemon parser)
          mkdir -p coverage/xml coverage/html
          for pkg in "${packages[@]}"; do
            echo "Running Tarpaulin for ${pkg}"
            cargo tarpaulin --package "${pkg}" --all-targets --out Xml --timeout 300
            mv cobertura.xml "coverage/xml/${pkg}.xml"
            cargo tarpaulin --package "${pkg}" --all-targets --out Html --timeout 300 || true
            if [ -f tarpaulin-report.html ]; then
              mv tarpaulin-report.html "coverage/html/${pkg}.html"
            fi
          done

      - name: Upload coverage (hymeko_core)
        uses: codecov/codecov-action@v4
        with:
          files: coverage/xml/hymeko_core.xml
          flags: hymeko_core
          name: coverage-hymeko-core
          fail_ci_if_error: false
          verbose: true

      - name: Upload coverage (hymeko_daemon)
        uses: codecov/codecov-action@v4
        with:
          files: coverage/xml/hymeko_daemon.xml
          flags: hymeko_daemon
          name: coverage-hymeko-daemon
          fail_ci_if_error: false
          verbose: true

      - name: Upload coverage (parser)
        uses: codecov/codecov-action@v4
        with:
          files: coverage/xml/parser.xml
          flags: parser
          name: coverage-parser
          fail_ci_if_error: false
          verbose: true

      - name: Upload HTML coverage as artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage/html
          retention-days: 30

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: workspace-tests
    steps:
      - uses: actions/checkout@v4
        with:
          # Commit SHA fetch avoids refs/pull/N/merge (intermittent auth failures on PRs).
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Install glslc
        run: sudo apt-get update && sudo apt-get install -y glslc
      - run: cargo build --workspace --all-targets --release --verbose
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: target/release/

  python-package:
    name: Python Package Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Commit SHA fetch avoids refs/pull/N/merge (intermittent auth failures on PRs).
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install maturin
        run: pip install maturin
      - name: Build Python package
        run: maturin build --release --manifest-path hymeko_py/Cargo.toml
      - name: Test Python package
        run: |
          pip install --find-links target/wheels hymeko
          python -c "import hymeko; print(hymeko.__doc__)"
