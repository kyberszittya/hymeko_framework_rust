[book]
title = "HyMeKo Framework"
authors = ["HyMeKo authors"]
description = "Hypergraph Model Cognition Framework — DSL, IR, and toolchain for declarative hypergraph design + codegen"
language = "en"
src = "src"

[output.html]
default-theme = "rust"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/kyberszittya/hymeko_framework_rust"
edit-url-template = "https://github.com/kyberszittya/hymeko_framework_rust/edit/master/docs/book/{path}"
mathjax-support = true
additional-css = ["theme/extra.css", "theme/mermaid-extra.css"]
additional-js = ["theme/mermaid-init.js"]

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true
limit-results = 30
heading-split-level = 2

[rust]
edition = "2024"
