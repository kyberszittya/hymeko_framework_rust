[package]
name = "hymeko_py"
version = "0.1.0"
edition = "2024"

[dependencies]
hymeko_core = { path = "../hymeko_core" }

ciborium = "0.2.2"
arrow = { version = "58.0.0", features = ["pyarrow", "ffi"] }
pyo3 = { version = "0.28.2", features = ["extension-module"] }
iceoryx2 = "0.8.1"
tokio = { version = "1.50.0", features = ["sync"] }